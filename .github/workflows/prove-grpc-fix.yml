name: Prove gRPC Elliptic Curve Fix

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # Job 1: Build the base Docker environment (cached)
  build-env:
    name: Build Test Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Cache Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: grpc-curve-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: Build the patched gRPC (cached by patch/script hash)
  build-patched:
    name: Build Patched gRPC
    needs: build-env
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache Patched Build Artifacts
        id: cache-patched
        uses: actions/cache@v5
        with:
          path: build/patched-grpc
          key: patched-grpc-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh', 'requirements.txt', 'Dockerfile') }}

      - name: Build Patched gRPC (All Languages)
        if: steps.cache-patched.outputs.cache-hit != 'true'
        run: |
          # Start the container
          docker build -t grpc-curve-test:latest .
          docker run --name builder -d -t grpc-curve-test:latest
          
          # Build all patched languages
          docker exec builder /bin/bash -o pipefail -c "./build-patched-grpc.sh --all --install"
          
          # Copy results out for caching
          mkdir -p build
          docker cp builder:/workspace/build/patched-grpc build/
          
          # Cleanup
          docker rm -f builder

  # Job 3: Run the comparison and generate the report
  run-proof:
    name: Run Proof & Report
    needs: build-patched
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Restore Patched Build Artifacts
        uses: actions/cache/restore@v5
        with:
          path: build/patched-grpc
          key: patched-grpc-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh', 'requirements.txt', 'Dockerfile') }}
          fail-on-cache-miss: true

      - name: Run Comparison (Baseline vs Patched)
        run: |
          # Build/load the image (should be fast due to Docker cache)
          docker build -t grpc-curve-test:latest .
          
          # Start container and inject patched artifacts
          docker run --name proof-container -d -t grpc-curve-test:latest
          docker cp build/patched-grpc proof-container:/workspace/build/
          
          # Run the comparison (skipping build as we injected it)
          # This step now only runs tests, which is fast!
          docker exec proof-container ./compare-grpc-versions.sh --language all --skip-build
          
          # Extract results
          docker cp proof-container:/workspace/reports .
          docker cp proof-container:/workspace/results .

      - name: Upload Comparison Report
        uses: actions/upload-artifact@v7
        with:
          name: grpc-curve-comparison-report
          path: |
            reports/*.md
            results/baseline/*.log
            results/patched/*.log

      - name: Display Summary
        run: |
          cat reports/comparison-*.md >> $GITHUB_STEP_SUMMARY
