name: Prove gRPC Elliptic Curve Fix

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # Job 1: Build the base Docker environment (cached)
  build-env:
    name: Build Test Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and Cache Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: grpc-curve-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: Build Patched Python gRPC
  build-python:
    name: Build Patched Python
    needs: build-env
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Load Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: grpc-curve-test:latest
          cache-from: type=gha

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ccache-python-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh') }}-${{ github.run_id }}
          restore-keys: |
            ccache-python-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh') }}-
            ccache-python-

      - name: Cache Patched Python
        id: cache-python
        uses: actions/cache@v5
        with:
          path: build/patched-grpc/venv
          key: patched-python-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh', 'requirements.txt') }}

      - name: Build Patched Python
        if: steps.cache-python.outputs.cache-hit != 'true'
        run: |
          mkdir -p .ccache
          docker run --name builder -d -t -v $(pwd)/.ccache:/root/.ccache -e CCACHE_DIR=/root/.ccache grpc-curve-test:latest
          docker exec builder /bin/bash -o pipefail -c "./build-patched-grpc.sh --python --install"
          mkdir -p build/patched-grpc
          docker cp builder:/workspace/build/patched-grpc/venv build/patched-grpc/
          docker rm -f builder

  # Job 3: Build Patched C++ gRPC
  build-cpp:
    name: Build Patched C++
    needs: build-env
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Load Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: grpc-curve-test:latest
          cache-from: type=gha

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ccache-cpp-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh') }}-${{ github.run_id }}
          restore-keys: |
            ccache-cpp-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh') }}-
            ccache-cpp-

      - name: Cache Patched C++
        id: cache-cpp
        uses: actions/cache@v5
        with:
          path: build/patched-grpc/install
          key: patched-cpp-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh') }}

      - name: Build Patched C++
        if: steps.cache-cpp.outputs.cache-hit != 'true'
        run: |
          mkdir -p .ccache
          docker run --name builder -d -t -v $(pwd)/.ccache:/root/.ccache -e CCACHE_DIR=/root/.ccache grpc-curve-test:latest
          docker exec builder /bin/bash -o pipefail -c "./build-patched-grpc.sh --cpp --install"
          mkdir -p build/patched-grpc
          docker cp builder:/workspace/build/patched-grpc/install build/patched-grpc/
          docker rm -f builder

  # Job 4: Build Patched Ruby gRPC
  build-ruby:
    name: Build Patched Ruby
    needs: [build-env, build-cpp]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Load Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: grpc-curve-test:latest
          cache-from: type=gha

      - name: Restore C++ (needed for Ruby build)
        uses: actions/cache/restore@v5
        with:
          path: build/patched-grpc/install
          key: patched-cpp-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh') }}
          fail-on-cache-miss: true

      - name: Cache ccache
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ccache-ruby-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh') }}-${{ github.run_id }}
          restore-keys: |
            ccache-ruby-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh') }}-
            ccache-ruby-

      - name: Cache Patched Ruby
        id: cache-ruby
        uses: actions/cache@v5
        with:
          path: build/patched-grpc/ruby-gems
          key: patched-ruby-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh') }}

      - name: Build Patched Ruby
        if: steps.cache-ruby.outputs.cache-hit != 'true'
        run: |
          mkdir -p .ccache
          docker run --name builder -d -t -v $(pwd)/.ccache:/root/.ccache -e CCACHE_DIR=/root/.ccache grpc-curve-test:latest
          
          # Inject C++ artifacts
          docker exec builder mkdir -p /workspace/build/patched-grpc
          docker cp build/patched-grpc/install builder:/workspace/build/patched-grpc/
          
          # Build Ruby gem against C++ artifacts
          docker exec builder /bin/bash -o pipefail -c "./build-patched-grpc.sh --ruby --install"
          
          mkdir -p build/patched-grpc
          docker cp builder:/workspace/build/patched-grpc/ruby-gems build/patched-grpc/
          docker rm -f builder

  # Job 5: Run the comparison and generate the report
  run-proof:
    name: Run Proof & Report
    needs: [build-python, build-cpp, build-ruby]
    if: always() && !cancelled() && needs.build-python.result == 'success' && needs.build-cpp.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Load Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: grpc-curve-test:latest
          cache-from: type=gha

      - name: Restore Python
        uses: actions/cache/restore@v5
        with:
          path: build/patched-grpc/venv
          key: patched-python-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh', 'requirements.txt') }}

      - name: Restore C++
        uses: actions/cache/restore@v5
        with:
          path: build/patched-grpc/install
          key: patched-cpp-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh') }}

      - name: Restore Ruby (optional)
        uses: actions/cache/restore@v5
        with:
          path: build/patched-grpc/ruby-gems
          key: patched-ruby-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh') }}

      - name: Run Comparison
        run: |
          docker run --name proof-container -d -t grpc-curve-test:latest
          
          # Inject all restored artifacts
          docker exec proof-container mkdir -p /workspace/build/patched-grpc/venv
          docker exec proof-container mkdir -p /workspace/build/patched-grpc/install
          
          docker cp build/patched-grpc/venv proof-container:/workspace/build/patched-grpc/
          docker cp build/patched-grpc/install proof-container:/workspace/build/patched-grpc/
          
          # Inject Ruby gems if they exist
          if [ -d "build/patched-grpc/ruby-gems" ]; then
            docker exec proof-container mkdir -p /workspace/build/patched-grpc/ruby-gems
            docker cp build/patched-grpc/ruby-gems proof-container:/workspace/build/patched-grpc/
            LANGS="python,ruby,cpp"
          else
            LANGS="python,cpp"
          fi
          
          # Run tests
          docker exec proof-container ./compare-grpc-versions.sh --language $LANGS --skip-build
          
          # Extract results
          docker cp proof-container:/workspace/reports .
          docker cp proof-container:/workspace/results .

      - name: Upload Comparison Report
        uses: actions/upload-artifact@v7
        with:
          name: grpc-curve-comparison-report
          path: |
            reports/*.md
            results/**/*.log
            results/**/*.txt
            results/**/*.json

      - name: Display Summary
        run: |
          cat reports/comparison-*.md >> $GITHUB_STEP_SUMMARY
