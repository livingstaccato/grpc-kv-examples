name: Prove gRPC Elliptic Curve Fix

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # Job 1: Build the base Docker environment (cached)
  build-env:
    name: Build Test Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Cache Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: grpc-curve-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2a: Build patched Python — runs in parallel with C++ and Ruby
  build-python:
    name: Build Patched Python
    needs: build-env
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Load Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: grpc-curve-test:latest
          cache-from: type=gha

      - name: Cache Patched Python Build
        id: cache-python
        uses: actions/cache@v4
        with:
          path: build/patched-grpc/venv
          key: patched-python-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh', 'Dockerfile') }}

      - name: Build Patched Python
        if: steps.cache-python.outputs.cache-hit != 'true'
        run: |
          docker run --name py-builder -d -t grpc-curve-test:latest
          docker exec py-builder ./build-patched-grpc.sh --python --install
          mkdir -p build/patched-grpc
          docker cp py-builder:/workspace/build/patched-grpc/venv build/patched-grpc/
          docker rm -f py-builder

      - name: Upload Python artifact
        uses: actions/upload-artifact@v4
        with:
          name: patched-python
          path: build/patched-grpc/venv
          retention-days: 1

  # Job 2b: Build patched C++ — runs in parallel with Python and Ruby
  build-cpp:
    name: Build Patched C++
    needs: build-env
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Load Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: grpc-curve-test:latest
          cache-from: type=gha

      - name: Cache Patched C++ Build
        id: cache-cpp
        uses: actions/cache@v4
        with:
          path: build/patched-grpc/install
          key: patched-cpp-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh', 'Dockerfile') }}

      - name: Build Patched C++
        if: steps.cache-cpp.outputs.cache-hit != 'true'
        run: |
          docker run --name cpp-builder -d -t grpc-curve-test:latest
          docker exec cpp-builder ./build-patched-grpc.sh --cpp --install
          mkdir -p build/patched-grpc
          docker cp cpp-builder:/workspace/build/patched-grpc/install build/patched-grpc/
          docker rm -f cpp-builder

      - name: Upload C++ artifact
        uses: actions/upload-artifact@v4
        with:
          name: patched-cpp
          path: build/patched-grpc/install
          retention-days: 1

  # Job 2c: Build patched Ruby — runs in parallel with Python and C++
  # Non-fatal: Ruby gem compilation is memory-intensive; Python + C++ are sufficient proof.
  build-ruby:
    name: Build Patched Ruby
    needs: build-env
    runs-on: ubuntu-latest
    timeout-minutes: 90
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Load Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: grpc-curve-test:latest
          cache-from: type=gha

      - name: Add swap to prevent OOM during native gem link
        run: |
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Cache Patched Ruby Build
        id: cache-ruby
        uses: actions/cache@v4
        with:
          path: build/patched-grpc/ruby-gems
          key: patched-ruby-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh', 'Dockerfile') }}

      - name: Build Patched Ruby
        if: steps.cache-ruby.outputs.cache-hit != 'true'
        run: |
          # Run with single compile job to minimise peak RSS during native .so link
          docker run --name ruby-builder -d -t grpc-curve-test:latest
          docker exec ruby-builder bash -c "sed -i 's/COMPILE_JOBS=2/COMPILE_JOBS=1/' build-patched-grpc.sh"
          docker exec ruby-builder ./build-patched-grpc.sh --ruby --install
          mkdir -p build/patched-grpc
          docker cp ruby-builder:/workspace/build/patched-grpc/ruby-gems build/patched-grpc/
          docker rm -f ruby-builder

      - name: Upload Ruby artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patched-ruby
          path: build/patched-grpc/ruby-gems
          if-no-files-found: ignore
          retention-days: 1

  # Job 3: Run the comparison and generate the report
  run-proof:
    name: Run Proof & Report
    needs: [build-python, build-cpp, build-ruby]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Load Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: grpc-curve-test:latest
          cache-from: type=gha

      - name: Download Python artifact
        uses: actions/download-artifact@v4
        with:
          name: patched-python
          path: build/patched-grpc/venv

      - name: Download C++ artifact
        uses: actions/download-artifact@v4
        with:
          name: patched-cpp
          path: build/patched-grpc/install

      - name: Download Ruby artifact (optional)
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: patched-ruby
          path: build/patched-grpc/ruby-gems

      - name: Run Comparison (Baseline vs Patched)
        run: |
          docker run --name proof-container -d -t grpc-curve-test:latest

          # Inject all patched artifacts
          docker exec proof-container mkdir -p /workspace/build/patched-grpc
          docker cp build/patched-grpc/venv       proof-container:/workspace/build/patched-grpc/
          docker cp build/patched-grpc/install     proof-container:/workspace/build/patched-grpc/
          if [ -d "build/patched-grpc/ruby-gems" ]; then
            docker cp build/patched-grpc/ruby-gems proof-container:/workspace/build/patched-grpc/
          fi

          # Run the comparison (build already done, just test)
          docker exec proof-container ./compare-grpc-versions.sh --language all --skip-build

          # Extract results
          docker cp proof-container:/workspace/reports . || true
          docker cp proof-container:/workspace/results . || true
          docker rm -f proof-container

      - name: Upload Comparison Report
        uses: actions/upload-artifact@v4
        with:
          name: grpc-curve-comparison-report
          path: |
            reports/*.md
            results/baseline/*.log
            results/patched/*.log

      - name: Display Summary
        run: |
          cat reports/comparison-*.md >> $GITHUB_STEP_SUMMARY || true
