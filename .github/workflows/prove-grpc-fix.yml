name: Prove gRPC Elliptic Curve Fix

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # Job 1: Build the base Docker environment (cached)
  build-env:
    name: Build Test Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Cache Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: grpc-curve-test:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: Build patched gRPC for all languages
  # Each language runs in its own container to avoid disk pressure
  # (~14GB limit on runners; Python+C++Ruby compiled together exceeds it)
  build-patched:
    name: Build Patched gRPC
    needs: build-env
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Load Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: grpc-curve-test:latest
          cache-from: type=gha

      - name: Cache Patched Build Artifacts
        id: cache-patched
        uses: actions/cache@v4
        with:
          path: build/patched-grpc
          key: patched-grpc-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh', 'requirements.txt', 'Dockerfile') }}

      - name: Build Patched Python
        if: steps.cache-patched.outputs.cache-hit != 'true'
        run: |
          # Each language gets its own container so disk never exceeds ~14GB limit
          docker run --name py-builder -d -t grpc-curve-test:latest
          docker exec py-builder ./build-patched-grpc.sh --python --install
          mkdir -p build/patched-grpc
          docker cp py-builder:/workspace/build/patched-grpc/venv build/patched-grpc/
          docker rm -f py-builder

      - name: Build Patched C++
        if: steps.cache-patched.outputs.cache-hit != 'true'
        run: |
          docker run --name cpp-builder -d -t grpc-curve-test:latest
          docker exec cpp-builder ./build-patched-grpc.sh --cpp --install
          mkdir -p build/patched-grpc
          docker cp cpp-builder:/workspace/build/patched-grpc/install build/patched-grpc/
          docker rm -f cpp-builder

      - name: Build Patched Ruby
        # Non-fatal: Ruby gem compilation is ~30 min and memory-intensive.
        # Python + C++ are sufficient proof; Ruby adds additional coverage.
        if: steps.cache-patched.outputs.cache-hit != 'true'
        continue-on-error: true
        run: |
          docker run --name ruby-builder -d -t grpc-curve-test:latest
          docker exec ruby-builder ./build-patched-grpc.sh --ruby --install
          mkdir -p build/patched-grpc
          docker cp ruby-builder:/workspace/build/patched-grpc/ruby-gems build/patched-grpc/ || true
          docker rm -f ruby-builder

  # Job 3: Run the comparison and generate the report
  run-proof:
    name: Run Proof & Report
    needs: build-patched
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Load Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: grpc-curve-test:latest
          cache-from: type=gha

      - name: Restore Patched Build Artifacts
        uses: actions/cache/restore@v4
        with:
          path: build/patched-grpc
          key: patched-grpc-${{ hashFiles('patches/*.patch', 'build-patched-grpc.sh', 'requirements.txt', 'Dockerfile') }}
          fail-on-cache-miss: true

      - name: Run Comparison (Baseline vs Patched)
        run: |
          docker run --name proof-container -d -t grpc-curve-test:latest

          # Inject all patched artifacts
          docker exec proof-container mkdir -p /workspace/build/patched-grpc
          docker cp build/patched-grpc/venv       proof-container:/workspace/build/patched-grpc/
          docker cp build/patched-grpc/install     proof-container:/workspace/build/patched-grpc/
          if [ -d "build/patched-grpc/ruby-gems" ]; then
            docker cp build/patched-grpc/ruby-gems proof-container:/workspace/build/patched-grpc/
          fi

          # Run the comparison (build already done, just test)
          docker exec proof-container ./compare-grpc-versions.sh --language all --skip-build

          # Extract results
          docker cp proof-container:/workspace/reports . || true
          docker cp proof-container:/workspace/results . || true
          docker rm -f proof-container

      - name: Upload Comparison Report
        uses: actions/upload-artifact@v4
        with:
          name: grpc-curve-comparison-report
          path: |
            reports/*.md
            results/baseline/*.log
            results/patched/*.log

      - name: Display Summary
        run: |
          cat reports/comparison-*.md >> $GITHUB_STEP_SUMMARY || true
