[package]
name = "grpc-kv-rust"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "rust-kv-server"
path = "src/server.rs"

[[bin]]
name = "rust-kv-client"
path = "src/client.rs"

[dependencies]
tonic = "0.12"
prost = "0.13"
tokio = { version = "1.0", features = ["macros", "rt-multi-thread", "time", "sync"] }
tokio-rustls = "0.26"
rustls = "0.23"
rustls-pemfile = "2.2"
rustls-pki-types = "1.10"
env_logger = "0.11"
log = "0.4"

[build-dependencies]
tonic-build = "0.12"
