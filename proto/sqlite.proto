syntax = "proto3";

package proto;

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// Service definition for interacting with a SimpleSQL database
service SimpleSQLStore {
  // Executes a SQL query and streams the results back to the client.
  // This RPC is suitable for queries that may return a large number of rows.
  // The server will send a stream of QueryResponse messages, each containing
  // a subset of the result rows. The final QueryResponse message will contain
  // the overall status of the query execution.
  //
  // Example Usage:
  //   Client: ExecuteQuery(QueryRequest{ connection_id: "conn1", query: "SELECT * FROM large_table" })
  //   Server: (streams multiple QueryResponse messages with row data)
  //   Server: QueryResponse{ status: Status{ code: OK, message: "" } }
  rpc ExecuteQuery(QueryRequest) returns (stream QueryResponse);

  // Cancels an ongoing query.
  //
  // The client must provide the connection ID and the query ID of the query to cancel.
  // The query ID should be obtained from the initial QueryResponse message
  // returned by ExecuteQuery.
  rpc CancelQuery(CancelQueryRequest) returns (google.protobuf.Empty);

  // Executes an update SQL statement (e.g., INSERT, UPDATE, DELETE).
  // Returns the number of rows affected and the ID of the last inserted row (if applicable).
  rpc ExecuteUpdate(UpdateRequest) returns (UpdateResponse);

  // Executes multiple queries or updates in a single batch.
  // Each query or update can have its own parameters.
  rpc BatchExecute(BatchRequest) returns (BatchResponse);

  // Performs bulk inserts into a table, optimizing for large data loads.
  // The client provides the table name, columns, and rows to insert.
  rpc ExecuteBulkInsert(BulkInsertRequest) returns (BulkInsertResponse);

  // Retrieves schema details for a specific table.
  //
  // Example Usage:
  //   Client: GetSchema(SchemaRequest{ connection_id: "conn1", table_name: "users" })
  //   Server: SchemaResponse{ columns: [...], status: Status{ code: OK, message: "" } }
  rpc GetSchema(SchemaRequest) returns (SchemaResponse);

  // Provides the query plan for debugging and optimization purposes.
  // The client sends a SQL query, and the server responds with the execution plan steps.
  rpc ExplainQueryPlan(ExplainQueryRequest) returns (ExplainQueryResponse);

  // Performs database vacuum to optimize the database by cleaning up unused spaces.
  rpc VacuumDatabase(VacuumRequest) returns (VacuumResponse);

  // Creates a backup of the database.
  // The client specifies the path where the backup should be stored.
  rpc BackupDatabase(BackupRequest) returns (BackupResponse);

  // Checks the integrity of the database.
  // This ensures that the database is not corrupted and is in a consistent state.
  rpc CheckIntegrity(IntegrityRequest) returns (IntegrityResponse);

  // Retrieves metadata about the database, such as size, page count, and database version.
  rpc GetDatabaseInfo(DatabaseInfoRequest) returns (DatabaseInfoResponse);

  // Table management
  rpc CreateTable(CreateTableRequest) returns (CreateTableResponse); // Create a new table
  rpc DropTable(DropTableRequest) returns (DropTableResponse); // Drop an existing table
  rpc ListTables(ListTablesRequest) returns (ListTablesResponse); // List all tables
  rpc AlterTable(AlterTableRequest) returns (AlterTableResponse); // Alter a table structure

  // Index management
  rpc CreateIndex(CreateIndexRequest) returns (CreateIndexResponse); // Create a new index
  rpc DropIndex(DropIndexRequest) returns (DropIndexResponse); // Drop an existing index
  rpc ListIndexes(ListIndexesRequest) returns (ListIndexesResponse); // List all indexes

  // Connection pool management
  rpc GetConnectionPoolStats(ConnectionPoolStatsRequest) returns (ConnectionPoolStatsResponse); // Get connection pool statistics
  rpc SetConnectionPoolSize(ConnectionPoolSizeRequest) returns (ConnectionPoolSizeResponse); // Set the connection pool size

  // Statement preparation and execution
  rpc PrepareStatement(PrepareStatementRequest) returns (PrepareStatementResponse); // Prepare a SQL statement
  rpc ExecutePreparedStatement(ExecutePreparedStatementRequest) returns (stream QueryResponse); // Execute a prepared statement
  rpc DeletePreparedStatement(DeletePreparedStatementRequest) returns (google.protobuf.Empty); // Clean up prepared statement

  // Transaction management
  rpc BeginTransaction(google.protobuf.Empty) returns (TransactionResponse); // Start a new transaction
  rpc CommitTransaction(TransactionRequest) returns (TransactionResponse); // Commit the active transaction
  rpc RollbackTransaction(TransactionRequest) returns (TransactionResponse); // Rollback the active transaction
  rpc GetTransactionState(GetTransactionStateRequest) returns (GetTransactionStateResponse); // Get the current transaction state

  // Connection management
  rpc CreateConnection(ConnectionRequest) returns (ConnectionResponse); // Establish a new connection
  rpc CloseConnection(ConnectionRequest) returns (google.protobuf.Empty); // Close an active connection
}

// Status code and message for operations
message Status {
  enum Code {
    OK = 0; // Operation successful
    ERROR = 1; // General error
    CONSTRAINT_VIOLATION = 2; // Constraint violation error
    SYNTAX_ERROR = 3; // SQL syntax error
    INVALID_PARAMETER = 4; // Invalid input parameter
    TRANSACTION_ERROR = 5; // Transaction-related error
    TIMEOUT = 6; // Timeout error
    TABLE_NOT_FOUND = 7; // Table not found
    INDEX_NOT_FOUND = 8; // Index not found
    COLUMN_NOT_FOUND = 9; // Column not found
    CONNECTION_ERROR = 10; // Connection error
    STATEMENT_NOT_FOUND = 11; // Prepared statement not found
    DATABASE_LOCKED = 12; // Database is locked
  }
  Code code = 1; // Status code
  string message = 2; // Human-readable error message
  Status sub_status = 3; // Nested status for more context
}

// Parameter for queries/statements
message Parameter {
  optional string name = 1; // Optional name for named parameters
  oneof value {
    int64 int_value = 2; // Integer value
    double float_value = 3; // Float value
    string string_value = 4; // String value
    bytes blob_value = 5; // Binary value
    google.protobuf.Timestamp timestamp_value = 6; // Timestamp value
    bool null_value = 7; // Explicit NULL value
  }
}

// Query execution messages
message QueryRequest {
  string connection_id = 1; // Connection identifier
  string query = 2; // SQL query string
  repeated Parameter params = 3; // Parameters for the query
  string transaction_id = 4; // Associated transaction ID
  optional int32 timeout_ms = 5; // Optional query timeout in milliseconds
  optional int32 limit = 6; // Optional limit for query results
  optional int32 offset = 7; // Optional offset for query results
}

message QueryResponse {
  string query_id = 1; // Unique identifier for the query
  repeated Row rows = 2; // Result rows
  repeated string column_names = 3; // Names of result columns
  repeated string column_types = 4; // Types of result columns
  int32 rows_affected = 5; // Number of rows affected (if applicable)
  Status status = 6; // Status of the query execution
  optional QueryStatistics statistics = 7; // Query execution statistics
}

message QueryStatistics {
  int64 execution_time_ms = 1; // Query execution time in milliseconds
  int64 rows_processed = 2; // Number of rows processed
  int64 memory_used = 3; // Memory used in bytes
  int32 page_reads = 4; // Number of page reads
  int32 page_writes = 5; // Number of page writes
}

// Additional detailed inline documentation added.
message CancelQueryRequest {
  string connection_id = 1; // Connection identifier
  string query_id = 2; // Identifier of the query to cancel
}

message Row {
  repeated Parameter values = 1; // Values in a row
}

// Update execution messages
message UpdateRequest {
  string connection_id = 1; // Connection identifier
  string query = 2; // SQL update statement
  repeated Parameter params = 3; // Parameters for the update
  string transaction_id = 4; // Associated transaction ID
}

message UpdateResponse {
  int32 rows_affected = 1; // Number of rows updated
  int64 last_insert_id = 2; // ID of the last inserted row
  Status status = 3; // Status of the update
}

// Batch execution messages
message BatchRequest {
  string connection_id = 1; // Connection identifier
  repeated QueryRequest queries = 2; // List of queries/updates to execute
  string transaction_id = 3; // Associated transaction ID
}

message BatchResponse {
  repeated QueryResponse results = 1; // Results of the batch execution
  Status status = 2; // Status of the batch execution
}

// Bulk insert messages
message BulkInsertRequest {
  string connection_id = 1; // Connection identifier
  string table_name = 2; // Table to insert data into
  repeated string columns = 3; // Columns for the bulk insert
  repeated Row rows = 4; // Rows to insert
  string transaction_id = 5; // Associated transaction ID
}

message BulkInsertResponse {
  int32 rows_affected = 1; // Number of rows inserted
  Status status = 2; // Status of the bulk insert operation
}

// Schema inspection messages
message SchemaRequest {
  string connection_id = 1; // Connection identifier
  string table_name = 2; // Name of the table to inspect
}

message SchemaResponse {
  repeated ColumnInfo columns = 1; // Details of table columns
  Status status = 2; // Status of the schema retrieval
}

message ColumnInfo {
  string name = 1; // Column name
  oneof column_type {
    string text_type = 2;      // For TEXT or VARCHAR columns
    bool int_type = 3;       // For INTEGER columns (boolean indicates presence of the type)
    bool real_type = 4;      // For REAL or FLOAT or DOUBLE columns (boolean indicates presence of the type)
    bool blob_type = 5;      // For BLOB columns (boolean indicates presence of the type)
    string numeric_type = 6;   // For NUMERIC or DECIMAL columns (can include precision/scale in the string)
    string date_type = 7;     // For DATE columns
    string time_type = 8;      // For TIME columns
    string datetime_type = 9; // For DATETIME or TIMESTAMP columns
    // Add other types as needed for your specific use cases
  }
  bool nullable = 10; // Whether the column allows NULL
  bool primary_key = 11; // Whether the column is part of the primary key
  string default_value = 12; // Default value of the column
  bool auto_increment = 13; // Whether the column is auto-incrementing
  repeated string foreign_key = 14; // Foreign key references (if any) - might need a more complex structure here too
}

// Table management messages
message CreateTableRequest {
  string connection_id = 1; // Connection identifier
  string table_name = 2; // Name of the table to create
  repeated ColumnDefinition columns = 3; // Columns for the table
  repeated string constraints = 4; // Additional table constraints
}

message CreateTableResponse {
  Status status = 1; // Status of the create table operation
}

message DropTableRequest {
  string connection_id = 1; // Connection identifier
  string table_name = 2; // Name of the table to drop
}

message DropTableResponse {
  Status status = 1; // Status of the drop table operation
}

message ListTablesRequest {
  string connection_id = 1; // Connection identifier
}

message ListTablesResponse {
  repeated string tables = 1; // List of table names
  Status status = 2; // Status of the list tables operation
}

message AlterTableRequest {
  string connection_id = 1; // Connection identifier
  string table_name = 2; // Name of the table to alter
  repeated ColumnDefinition new_columns = 3; // New columns to add
}

message AlterTableResponse {
  Status status = 1; // Status of the alter table operation
}

message ColumnDefinition {
  string name = 1; // Column name
  string type = 2; // Column type
  bool nullable = 3; // Whether the column allows NULL
  string default_value = 4; // Default value of the column
  repeated string constraints = 5; // Column constraints
}

// Index management messages
message CreateIndexRequest {
  string connection_id = 1; // Connection identifier
  string index_name = 2; // Name of the index to create
  string table_name = 3; // Name of the table
  repeated string columns = 4; // Columns to index
}

message CreateIndexResponse {
  Status status = 1; // Status of the create index operation
}

message DropIndexRequest {
  string connection_id = 1; // Connection identifier
  string index_name = 2; // Name of the index to drop
}

message DropIndexResponse {
  Status status = 1; // Status of the drop index operation
}

message ListIndexesRequest {
  string connection_id = 1; // Connection identifier
  string table_name = 2; // Name of the table
}

message ListIndexesResponse {
  repeated string indexes = 1; // List of index names
  Status status = 2; // Status of the list indexes operation
}

// Connection pool management messages
message ConnectionPoolStatsRequest {
  string connection_id = 1; // Connection identifier
}

message ConnectionPoolStatsResponse {
  int32 total_connections = 1; // Total number of connections
  int32 active_connections = 2; // Number of active connections
  int32 idle_connections = 3; // Number of idle connections
  Status status = 4; // Status of the request
}

message ConnectionPoolSizeRequest {
  string connection_id = 1; // Connection identifier
  int32 max_size = 2; // Maximum number of connections in the pool
}

message ConnectionPoolSizeResponse {
  Status status = 1; // Status of the request
}

// Prepared statement messages
message PrepareStatementRequest {
  string connection_id = 1; // Connection identifier
  string query = 2; // SQL statement to prepare
  string transaction_id = 3; // Associated transaction ID
}

message PrepareStatementResponse {
  string statement_id = 1; // Identifier for the prepared statement
  Status status = 2; // Status of the preparation
}

message ExecutePreparedStatementRequest {
  string connection_id = 1; // Connection identifier
  string statement_id = 2; // Identifier for the prepared statement
  repeated Parameter params = 3; // Parameters for the execution
  string transaction_id = 4; // Associated transaction ID
}

message DeletePreparedStatementRequest {
  string connection_id = 1; // Connection identifier
  string statement_id = 2; // Identifier for the prepared statement
}

// Transaction messages
message TransactionRequest {
  string connection_id = 1; // Connection identifier
  string transaction_id = 2; // Identifier for the transaction
}

message TransactionResponse {
  string transaction_id = 1; // Identifier for the transaction
  Status status = 2; // Status of the transaction operation
}

message TransactionStateResponse {
  string transaction_id = 1; // Identifier for the transaction
  string state = 2; // Current state of the transaction (e.g., active, committed)
  Status status = 3; // Status of the request
}

// Request message for getting the state of a transaction.
message GetTransactionStateRequest {
  string connection_id = 1; // Connection identifier
  string transaction_id = 2; // Identifier for the transaction
}

// Response message for getting the state of a transaction.
message GetTransactionStateResponse {
  string transaction_id = 1; // Identifier for the transaction
  string state = 2; // Current state of the transaction (e.g., "active", "committed", "rolledback")
  Status status = 3; // Status of the request
}

// Vacuum database messages
message VacuumRequest {
  string connection_id = 1; // Connection identifier
}

message VacuumResponse {
  Status status = 1; // Status of the vacuum operation
}

// Backup database messages
message BackupRequest {
  string connection_id = 1; // Connection identifier
  string backup_path = 2; // Path to store the backup
}

message BackupResponse {
  Status status = 1; // Status of the backup operation
  int64 backup_size = 2; // Size of the backup in bytes
}

// Database integrity messages
message IntegrityRequest {
  string connection_id = 1; // Connection identifier
}

message IntegrityResponse {
  Status status = 1; // Status of the integrity check
}

// Database information messages
message DatabaseInfoRequest {
  string connection_id = 1; // Connection identifier
}

message DatabaseInfoResponse {
  int64 size_bytes = 1; // Total size of the database in bytes
  int32 page_size = 2; // Page size of the database
  int32 page_count = 3; // Number of pages in the database
  repeated string attached_databases = 4; // List of attached databases
  string db_version = 5; // Database version
  Status status = 6; // Status of the request
}

// Explain query plan messages
message ExplainQueryRequest {
  string connection_id = 1; // Connection identifier
  string query = 2; // SQL query string
}

message ExplainQueryResponse {
  repeated string steps = 1; // Steps in the query execution plan
  Status status = 2; // Status of the explain query request
}

// Connection management messages
message ConnectionRequest {
  string database_path = 1; // Path to the SimpleSQL database or connection string
  optional int32 global_timeout_ms = 2; // Default timeout for all operations on this connection
}

message ConnectionResponse {
  string connection_id = 1; // Identifier for the new connection
  Status status = 2; // Status of the connection creation
}
